<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Gallery - Community Portal</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { text-align: center; color: #2c3e50; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    td { padding: 15px; text-align: center; background: white; border: 1px solid #ddd; }

    /* Image class with borders */
    .event-img {
      width: 200px;
      height: 150px;
      object-fit: cover;
      border: 3px solid #2980b9;
      border-radius: 8px;
    }

    caption { font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
    .img-label { font-size: 13px; color: #555; margin-top: 8px; }
  </style>
</head>
<body>

  <h1>📸 Community Events Gallery</h1>

  <table>
    <caption>Past Community Events - 2024</caption>
    <tr>
      <!-- Row 1: Using placeholder images with alt and title -->
      <td>
        <img src="https://via.placeholder.com/200x150/3498db/white?text=Music+Festival"
             alt="Music Festival event photo"
             title="Annual Music Festival 2024"
             class="event-img">
        <p class="img-label">🎵 Music Festival</p>
      </td>
      <td>
        <img src="https://via.placeholder.com/200x150/e74c3c/white?text=Tech+Meetup"
             alt="Tech Meetup event photo"
             title="Community Tech Meetup 2024"
             class="event-img">
        <p class="img-label">💻 Tech Meetup</p>
      </td>
      <td>
        <img src="https://via.placeholder.com/200x150/2ecc71/white?text=Art+Exhibition"
             alt="Art Exhibition event photo"
             title="Art Exhibition 2024"
             class="event-img">
        <p class="img-label">🎨 Art Exhibition</p>
      </td>
    </tr>
    <tr>
      <!-- Row 2 -->
      <td>
        <img src="https://via.placeholder.com/200x150/9b59b6/white?text=Food+Fair"
             alt="Food Fair event photo"
             title="Community Food Fair 2024"
             class="event-img">
        <p class="img-label">🍕 Food Fair</p>
      </td>
      <td>
        <img src="https://via.placeholder.com/200x150/f39c12/white?text=Sports+Day"
             alt="Sports Day event photo"
             title="Annual Sports Day 2024"
             class="event-img">
        <p class="img-label">⚽ Sports Day</p>
      </td>
      <td>
        <img src="https://via.placeholder.com/200x150/1abc9c/white?text=Book+Fair"
             alt="Book Fair event photo"
             title="Community Book Fair 2024"
             class="event-img">
        <p class="img-label">📚 Book Fair</p>
      </td>
    </tr>
  </table>

</body>
</html>
