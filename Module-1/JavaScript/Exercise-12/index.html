<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AJAX & Fetch - Community Portal</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f4f8; }
    .container { background: white; padding: 25px; border-radius: 8px; max-width: 550px; margin: 0 auto; }
    h2 { color: #2c3e50; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin: 8px 0; }
    button { width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    #spinner { text-align: center; padding: 15px; font-size: 20px; display: none; }
    #result  { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; }
    .success { background: #d5f5e3; border-left: 4px solid #27ae60; color: #1e8449; }
    .error   { background: #fadbd8; border-left: 4px solid #e74c3c; color: #922b21; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Exercise 12: AJAX & Fetch API</h2>
    <p>Fill in the form and click submit. A simulated POST request will be made.</p>

    <input type="text"  id="name"  placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <select id="event" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin:8px 0;">
      <option value="">-- Select Event --</option>
      <option value="Music Festival">🎵 Music Festival</option>
      <option value="Tech Meetup">💻 Tech Meetup</option>
      <option value="Art Exhibition">🎨 Art Exhibition</option>
    </select>

    <button onclick="submitRegistration()">📤 Submit Registration</button>

    <div id="spinner">⏳ Submitting...</div>
    <div id="result"></div>
  </div>

  <script>
    async function submitRegistration() {
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const event = document.getElementById('event').value;

      if (!name || !email || !event) {
        showResult('❌ Please fill in all fields.', false);
        return;
      }

      // Show spinner using setTimeout to simulate delay
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      // Simulate delayed response with setTimeout
      await new Promise(resolve => setTimeout(resolve, 2000));

      try {
        // POST data to mock API using fetch()
        const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, event })
        });

        if (!response.ok) throw new Error(`HTTP error: ${response.status}`);

        const data = await response.json();
        document.getElementById('spinner').style.display = 'none';
        showResult(`✅ Registration submitted successfully! (ID: ${data.id}) — ${name} registered for ${event}.`, true);

      } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        showResult(`❌ Submission failed: ${err.message}`, false);
      }
    }

    function showResult(message, success) {
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.className = success ? 'success' : 'error';
      result.textContent = message;
    }
  </script>
</body>
</html>
