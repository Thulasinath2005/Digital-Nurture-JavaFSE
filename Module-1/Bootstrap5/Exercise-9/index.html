<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buttons - Community Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
  <div class="container">
    <h2 class="fw-bold mb-4">Exercise 9: Buttons</h2>

    <!-- 9.1: All contextual button classes -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white fw-bold">9.1 — Contextual Button Classes</div>
      <div class="card-body d-flex flex-wrap gap-2">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-info">Info</button>
        <button class="btn btn-light">Light</button>
        <button class="btn btn-dark">Dark</button>
        <button class="btn btn-outline-primary">Outline Primary</button>
        <button class="btn btn-outline-success">Outline Success</button>
        <button class="btn btn-outline-danger">Outline Danger</button>
        <button class="btn btn-link">Link Button</button>
      </div>
    </div>

    <!-- 9.2: Button groups and toggle buttons -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-secondary text-white fw-bold">9.2 — Button Groups & Toggle Buttons</div>
      <div class="card-body">
        <p class="fw-semibold">Button Group:</p>
        <div class="btn-group mb-3" role="group">
          <button class="btn btn-primary">Day</button>
          <button class="btn btn-primary">Week</button>
          <button class="btn btn-primary">Month</button>
        </div>

        <p class="fw-semibold">Toggle Checkboxes:</p>
        <div class="btn-group" role="group">
          <input type="checkbox" class="btn-check" id="toggle1" autocomplete="off">
          <label class="btn btn-outline-success" for="toggle1">🎵 Music</label>

          <input type="checkbox" class="btn-check" id="toggle2" autocomplete="off">
          <label class="btn btn-outline-primary" for="toggle2">💻 Tech</label>

          <input type="checkbox" class="btn-check" id="toggle3" autocomplete="off">
          <label class="btn btn-outline-warning" for="toggle3">🎨 Art</label>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
