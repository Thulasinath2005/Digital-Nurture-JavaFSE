<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Icons - Community Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light py-4">
  <div class="container">
    <h2 class="fw-bold mb-4">Exercise 17: Bootstrap Icons</h2>

    <!-- 17.1: Social media icons in footer style -->
    <h5 class="text-muted mb-3">17.1 — Social Media Icons (Footer)</h5>
    <div class="bg-dark text-white p-4 rounded mb-4 text-center">
      <p class="fw-bold mb-3">Follow Us</p>
      <div class="d-flex justify-content-center gap-3">
        <a href="#" class="text-white fs-4"><i class="bi bi-facebook"></i></a>
        <a href="#" class="text-white fs-4"><i class="bi bi-twitter-x"></i></a>
        <a href="#" class="text-white fs-4"><i class="bi bi-instagram"></i></a>
        <a href="#" class="text-white fs-4"><i class="bi bi-linkedin"></i></a>
        <a href="#" class="text-white fs-4"><i class="bi bi-youtube"></i></a>
      </div>
      <p class="mt-3 small text-muted">Community Event Portal © 2025</p>
    </div>

    <!-- 17.2: Icon-only buttons -->
    <h5 class="text-muted mb-3">17.2 — Icon-Only Buttons</h5>
    <div class="d-flex flex-wrap gap-2 mb-3">
      <button class="btn btn-primary" title="Home"><i class="bi bi-house-fill"></i></button>
      <button class="btn btn-success" title="Add Event"><i class="bi bi-plus-circle-fill"></i></button>
      <button class="btn btn-warning" title="Search"><i class="bi bi-search"></i></button>
      <button class="btn btn-danger" title="Delete"><i class="bi bi-trash-fill"></i></button>
      <button class="btn btn-info" title="Edit"><i class="bi bi-pencil-fill"></i></button>
      <button class="btn btn-secondary" title="Settings"><i class="bi bi-gear-fill"></i></button>
      <button class="btn btn-dark" title="Download"><i class="bi bi-download"></i></button>
    </div>

    <!-- Icon with text -->
    <h5 class="text-muted mb-3">Icons with Text</h5>
    <div class="d-flex flex-wrap gap-2">
      <button class="btn btn-primary"><i class="bi bi-calendar-event me-2"></i>View Events</button>
      <button class="btn btn-success"><i class="bi bi-person-plus-fill me-2"></i>Register</button>
      <button class="btn btn-outline-danger"><i class="bi bi-x-circle me-2"></i>Cancel</button>
      <button class="btn btn-outline-dark"><i class="bi bi-share me-2"></i>Share</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
