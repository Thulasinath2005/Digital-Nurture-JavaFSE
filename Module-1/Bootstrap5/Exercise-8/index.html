<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms - Community Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
  <div class="container" style="max-width:600px;">

    <h2 class="fw-bold mb-4">Exercise 8: Bootstrap Forms</h2>

    <!-- 8.1: Registration form with form-control, form-check, input-group -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white fw-bold">8.1 — Registration Form</div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" placeholder="Enter your name">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <!-- input-group with icon -->
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input type="email" class="form-control" placeholder="you@example.com">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Select Event</label>
          <select class="form-select">
            <option value="">-- Choose an event --</option>
            <option>🎵 Music Festival</option>
            <option>💻 Tech Meetup</option>
            <option>🎨 Art Exhibition</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Interests</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="chk1">
            <label class="form-check-label" for="chk1">Receive event updates via email</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="chk2">
            <label class="form-check-label" for="chk2">Agree to Terms & Conditions</label>
          </div>
        </div>
        <button class="btn btn-primary w-100">Register</button>
      </div>
    </div>

    <!-- 8.2: Login form with form-floating -->
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white fw-bold">8.2 — Login Form (form-floating)</div>
      <div class="card-body">
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
          <label for="loginEmail">Email address</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="loginPass" placeholder="Password">
          <label for="loginPass">Password</label>
        </div>
        <button class="btn btn-success w-100">Login</button>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
